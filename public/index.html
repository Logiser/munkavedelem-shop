<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0F2A1D" />
    <meta name="description" content="Munkavédelmi ruházat és felszerelés - EN ISO szabványok szerint" />
    
    <!-- OpenGraph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="MunkavédelmiShop - Munkavédelmi Ruházat & Felszerelés" />
    <meta property="og:description" content="Prémium minőségű munkavédelmi felszerelés hatósági szabványok szerint" />
    <meta property="og:locale" content="hu_HU" />
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>⛑️</text></svg>" />
    
    <title>MunkavédelmiShop - Munkavédelmi Ruházat & Felszerelés</title>
    
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #fafaf8;
      }
      
      code {
        font-family: source-code-pro, Menlo, Monaco, Consolas, 'Courier New',
          monospace;
      }
      
      a {
        color: inherit;
        text-decoration: none;
      }
      
      /* Scroll behavior */
      html {
        scroll-behavior: smooth;
      }
      
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }
      
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #0F2A1D;
        border-radius: 5px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #C9A961;
      }
    </style>
  </head>
  <body>
    <noscript>Ezt az alkalmazást a JavaScript engedélyezésével lehet használni.</noscript>
    <div id="root"></div>
  </body>
</html>
